<div fxLayout="column" fxLayoutAlign="start stretch" >
    <mat-toolbar color="primary">
        <button mat-icon-button class="example-icon" aria-label="Example icon-button with menu icon">
            <mat-icon>menu</mat-icon>
        </button>
        <!-- <span>{{ title$ | async }}</span> -->
        <span class="example-spacer"></span>
        <button mat-icon-button class="example-icon favorite-icon" aria-label="Example icon-button with heart icon">
            <mat-icon>favorite</mat-icon>
        </button>
        <button mat-icon-button class="example-icon" aria-label="Example icon-button with share icon">
            <mat-icon>share</mat-icon>
        </button>
    </mat-toolbar>
    
    <div class="app-content" >
        <div fxLayout="row">
            <ngm-smart-filter [dataSettings]="dataSettings"
                [options]="smartFilterOptions"
                [(ngModel)]="slicer"
                (ngModelChange)="onSlicerChange($event)">
            </ngm-smart-filter>

            <ngm-smart-filter [dataSettings]="dataSettings"
                [options]="productFilterOptions"
                [(ngModel)]="product"
                (ngModelChange)="onSlicerChange($event)">
            </ngm-smart-filter>

            <ngm-smart-filter [dataSettings]="dataSettings"
                [options]="{
                    dimension: departmentDimension
                }"
                [(ngModel)]="department"
                (ngModelChange)="onSlicerChange($event)">
            </ngm-smart-filter>

            <ngm-member-tree [dataSettings]="dataSettings"
                [dimension]="departmentDimension"
            ></ngm-member-tree>

            <ngm-member-table [dataSettings]="dataSettings"
                [dimension]="departmentDimension"
                [(ngModel)]="department"
                (ngModelChange)="onSlicerChange($event)"
            ></ngm-member-table>
        </div>

        <div>
            {{ department | json }}
        </div>


        <div fxFlex="100" fxLayout="row wrap" fxLayoutAlign="start start" fxLayoutGap="1rem grid">
            <div *ngFor="let card of cards" fxFlex="calc(33% - 1rem)">
                <ngm-analytical-card displayDensity="compact"
                    [title]="card.title"
                    [dataSettings]="card.dataSettings"
                    [chartSettings]="card.chartSettings"
                    [chartOptions]="card.chartOptions"
                    [options]="{
                    }"
                ></ngm-analytical-card>
            </div>
        </div>
    </div>
</div>
