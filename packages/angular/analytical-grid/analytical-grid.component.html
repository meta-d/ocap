<div *ngIf="options?.showToolbar" class="ngm-card-header" fxLayout="row" fxLayoutAlign="space-between center">
  <div>{{ title }}</div>

  <div class="actions" fxLayout="row" fxLayoutAlign="space-around center">

    <ng-content select="[ngmAction]"></ng-content>

    <!-- Refresh & Loading icon -->
    <button mat-icon-button class="ngm-analytical-grid__refresh"
      [style.opacity]="(isLoading$ | async) ? '0' : '1'"
      [style.visibility]="(isLoading$ | async) ? 'hidden' : 'visible'"
      (click)="refresh()">
      <mat-icon fontSet="material-icons-outlined">refresh</mat-icon>
    </button>
    
    <mat-spinner *ngIf="isLoading$ | async"
      [diameter]="20"
      [strokeWidth]="1"
    >
    </mat-spinner>
  </div>
</div>

<div class="ngm-card-content">
    <div class="ngm-analytical-grid__error" *ngIf="error$ | async as error">{{error}}</div>
    
    <table mat-table *ngIf="pivotColumnLevels" [class.ngm-table-grid]="options?.grid"
      [dataSource]="rowDataSource" [displayDensity]="appearance?.displayDensity" >
      <ng-container [matColumnDef]="column.name" *ngFor="let column of rows; let j = index;">
        <th mat-header-cell *matHeaderCellDef [attr.rowspan]="pivotColumnLevels"
          [ngClass]="{
            'ngm-dimension': column.property?.role === AggregationRole.dimension,
            'ngm-measure': column.property?.role === AggregationRole.measure
          }"
        > {{column.label || column.name}} </th>
        
        <td mat-cell *matCellDef="let element;"
          [ngClass]="{
            'ngm-dimension': column.property?.role === AggregationRole.dimension,
            'ngm-measure': column.property?.role === AggregationRole.measure,
            selected: selected.j === j
          }"
          (mousedown)="selectCell(j)"
        >
          <div fxLayout="row" fxLayoutAlign="start center">
            <ng-container *ngIf="column.name === rowTreeProperty">
              <button mat-icon-button [displayDensity]="appearance?.displayDensity"
                  [style.visibility]="!element.expandable ? 'hidden' : ''"
                  [style.marginLeft.px]="element.level * treeNodePadding"
                  (click)="rowTreeControl.toggle(element)"
                  >
                  <mat-icon class="mat-icon-rtl-mirror">
                    {{rowTreeControl.isExpanded(element) ? 'expand_more' : 'chevron_right'}}
                  </mat-icon>
              </button>
            </ng-container>
            
            <!-- <ng-container *ngIf="column.property?.role === AggregationRole.measure">
              <span *ngIf="column.property?.dataType !== 'string'">
                {{element[column.name] | number}}</span>
              <span *ngIf="column.property?.dataType === 'string'">
                {{element[column.name]}}</span>
            </ng-container> -->
      
            <ngm-display-behaviour *ngIf="column.property?.role !== AggregationRole.measure" fxFlex
              [option]="{value: element[column.name], label: element[column.caption]}"
              [displayBehaviour]="column.displayBehaviour">
            </ngm-display-behaviour>
          </div>
        </td>
      </ng-container>

      <ng-container *ngFor="let columns of pivotColumns; let i = index; last as last">
        <ng-container [matColumnDef]="column.name" *ngFor="let column of columns; let j = index;">
          <th mat-header-cell *matHeaderCellDef [attr.colspan]="column.colspan">
            <div fxLayout="row" fxLayoutAlign="start center" [style.marginTop.px]="column.level * treeNodePadding"
              class="pivot-column-header-content">
              <button mat-icon-button [displayDensity]="appearance?.displayDensity"
                [style.visibility]="!column.expandable ? 'hidden' : ''"
                (click)="toggleColumnTree(column)"
                >
                <mat-icon class="mat-icon-rtl-mirror">
                  {{columnTreeControl.isExpanded(column) ? 'expand_more' : 'chevron_right'}}
                </mat-icon>
              </button>
              {{column.label || column.name}}
            </div>
          </th>

          <ng-container *ngIf="last">
            <td mat-cell *matCellDef="let element;" [ngClass]="{selected: selected.j === column.name}"
              [style.textAlign]="'right'"
              (mousedown)="selectCell(column.name)">
              <span>{{element[column.name] | number}}</span></td>
          </ng-container>
        </ng-container>
      </ng-container>
      
      <!-- 单独设置一行抬头是因为全部放在下面循环里创建的话没有被识别出来, 还未找到原因 -->
      <tr mat-header-row *matHeaderRowDef="treeDisplayedColumns; sticky:options?.sticky"></tr>
      <tr mat-header-row *matHeaderRowDef="displayedColumns[0]; sticky:options?.sticky" [class.empty]="!displayedColumns[0]"></tr>
      <tr mat-header-row *matHeaderRowDef="displayedColumns[1]; sticky:options?.sticky;" [class.empty]="!displayedColumns[1]"></tr>

      <!-- 循环里的 mat-header-row 当变化时没有被识别出来, 所以固定写死几行 header row 用 empty class 的方式将空行其隐藏 -->
      <!-- <ng-container *ngFor="let columns of displayedColumns;">
        <tr mat-header-row *matHeaderRowDef="columns; sticky:options?.sticky"></tr>
      </ng-container> -->

      <tr mat-row *matRowDef="let row; columns: matRowColumns; let i = index"
        [ngClass]="{selected: selected.i === i}"
        (mousedown)="selectRow(i)"
        >
      </tr>
    </table>
</div>

<mat-paginator *ngIf="options?.paging" [pageSize]="options?.pageSize" [pageSizeOptions]="[20, 50, 100]" showFirstLastButtons></mat-paginator>

<mat-spinner *ngIf="isLoading$ | async" strokeWidth="2" diameter="30" class="ngm-analytical-grid__loading"></mat-spinner>
