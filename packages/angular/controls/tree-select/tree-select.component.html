<ngm-tree-select [appearance]="appearance?.appearance" [displayDensity]="appearance?.displayDensity"
  [label]="label"
  [treeNodes]="treeData$ | async"
  [initialLevel]="initialLevel"
  [multiple]="multiple"
  [virtualScroll]="virtualScroll"
  [autocomplete]="autocomplete"
  [searchable]="searchable"
  [treeViewer]="treeViewer"
  [(ngModel)]="memberKeys"
  (ngModelChange)="onModelChange($event)"
></ngm-tree-select>
