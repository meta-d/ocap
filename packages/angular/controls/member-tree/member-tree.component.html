<mat-form-field *ngIf="options?.searchable" [appearance]="appearance?.appearance" [displayDensity]="appearance?.displayDensity">
    <mat-label>
      {{ 'Ngm.Common.Search' | translate: {Default: "Search"} }}
    </mat-label>
    <input matInput placeholder="{{ 'Ngm.Common.Search_Placeholder' | translate: {Default: 'Please input keyword'} }}"
      [formControl]="searchControl">

    <mat-icon matSuffix>search</mat-icon>
    <button *ngIf="searchControl.value" matSuffix mat-icon-button
      (click)="$event.stopPropagation();searchControl.setValue('')">
      <mat-icon>close</mat-icon>
    </button>
</mat-form-field>

<cdk-virtual-scroll-viewport fxFlex [itemSize]="40">
  <ng-container *cdkVirtualFor="let node of dataSource">
    <!-- Note that the [style.padding-left] is essentially what cdkTreeNodePadding is doing under the hood -->
    <div class="tree-node" [style.padding-left]="node.level * 24 + 'px'">
      <!-- Note that treeControl.toggle(node) is essentially what cdkTreeNodeToggle is doing under the hood -->
      <button mat-icon-button disabled *ngIf="!node.expandable"></button>
      <button mat-icon-button (click)="treeControl.toggle(node)" *ngIf="node.expandable">
        <mat-icon class="mat-icon-rtl-mirror">
          {{ treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right' }}
        </mat-icon>
      </button>

      <mat-checkbox
        [checked]="isSelected(node.raw)"
        [indeterminate]="isPartiallySelected(node)"
        (change)="itemSelectionToggle(node)"
      >
        <ngm-display-behaviour [displayBehaviour]="displayBehaviour"
          [option]="node" [highlight]="searchControl.value"
        ></ngm-display-behaviour>
      </mat-checkbox>
    </div>
  </ng-container>
</cdk-virtual-scroll-viewport>
