<mat-form-field *ngIf="paramType === ParameterControlEnum.Input" fxFlex="100" 
    [displayDensity]="appearance?.displayDensity"
    [appearance]="appearance?.appearance">
    <mat-label>{{ parameter?.label || parameter?.name }}</mat-label>
    <input matInput [formControl]="inputControl" [type]="parameter.dataType ?? 'string'">
</mat-form-field>

<mat-radio-group *ngIf="paramType === ParameterControlEnum.Select" fxFlex="100" fxLayout="column" fxLayoutAlign="start start"
    [displayDensity]="appearance?.displayDensity"
    [ngModel]="$any(parameter.members?.[0])?.value"
    (ngModelChange)="updateParameterValue($event)"
>
    <mat-radio-button *ngFor="let option of parameter.availableMembers"
        [value]="option.value">{{ option.label }}</mat-radio-button>
</mat-radio-group>

<!-- 暂时先用简易版:平铺展示维度成员 -->
<ng-container *ngIf="paramType === ParameterControlEnum.Dimensions">
    <mat-selection-list *ngIf="multiple" fxFlex="100" [multiple]="true"
        [displayDensity]="appearance?.displayDensity"
        [compareWith]="compareWith"
        [(ngModel)]="members"
    >
        <mat-list-option *ngFor="let availableMember of availableMembers$ | async" [value]="availableMember">
            <ngm-display-behaviour [option]="availableMember"></ngm-display-behaviour>
        </mat-list-option>
    </mat-selection-list>

    <mat-selection-list *ngIf="!multiple" fxFlex="100" [multiple]="false"
        [displayDensity]="appearance?.displayDensity"
        [compareWith]="compareWith"
        [(ngModel)]="members"
    >
        <mat-list-option *ngFor="let availableMember of availableMembers$ | async" [value]="availableMember">
            <ngm-display-behaviour [option]="availableMember"></ngm-display-behaviour>
        </mat-list-option>
    </mat-selection-list>
</ng-container>
